name: 🧹 pre-commit

on:
  push:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Make eslint.sh executable
        run: chmod +x ./eslint.sh

      - name: 🧹 Run pre-commit
        uses: pre-commit/action@v3.0.1
